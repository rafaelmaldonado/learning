<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~/learning</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#11151f; --line:#1c2230; --fg:#c9d1d9;
    --dim:#5c6b82; --acc:#39d353; --acc2:#58a6ff; --warn:#e3b341; --red:#f85149;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--fg);
    font:14px/1.5 "SFMono-Regular",ui-monospace,"JetBrains Mono",Consolas,monospace;
    padding:24px; max-width:1100px; margin:0 auto;
  }
  a{color:var(--acc2);text-decoration:none}
  header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--line);padding-bottom:12px}
  h1{font-size:18px;margin:0;color:var(--fg)}
  h1 .c{color:var(--acc)}
  .clock{color:var(--dim);font-size:12px}
  .clock b{color:var(--warn)}
  .bar{display:flex;gap:24px;flex-wrap:wrap;margin:16px 0;color:var(--dim);font-size:12px}
  .bar b{color:var(--acc);font-size:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-top:8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;position:relative;transition:.15s;cursor:pointer}
  .card:hover{border-color:var(--acc2);transform:translateY(-2px)}
  .card .k{position:absolute;top:12px;right:14px;color:var(--dim);border:1px solid var(--line);border-radius:4px;padding:1px 7px;font-size:11px}
  .card h2{font-size:15px;margin:0 0 4px;color:var(--fg)}
  .card p{margin:0 0 12px;color:var(--dim);font-size:12.5px;min-height:34px}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;color:var(--acc);background:#0d1f14;border:1px solid #1c3a26;padding:1px 8px;border-radius:20px}
  .stats{display:flex;gap:16px;font-size:11.5px;color:var(--dim);border-top:1px solid var(--line);padding-top:10px}
  .stats span b{color:var(--fg);font-weight:600}
  .stats .fresh{color:var(--acc)} .stats .stale{color:var(--warn)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--dim);margin-right:5px}
  .fact{margin:22px 0 4px;padding:14px 16px;background:var(--panel);border-left:3px solid var(--warn);border-radius:0 6px 6px 0;color:var(--fg);font-size:13px}
  .fact .lbl{color:var(--warn);font-size:11px;letter-spacing:1px}
  footer{margin-top:28px;color:var(--dim);font-size:11px;border-top:1px solid var(--line);padding-top:12px}
  footer kbd{background:var(--line);border-radius:3px;padding:1px 6px;color:var(--fg)}
  .spin{color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1><span class="c">rafael</span>@learning:<span class="c">~</span>$ ./study.sh</h1>
  <div class="clock" id="clock">booting…</div>
</header>

<div class="bar" id="bar">
  <span><b id="s-total">·</b> repos activos</span>
  <span><b id="s-commits">·</b> commits (30d)</span>
  <span><b id="s-days">·</b> días aprendiendo</span>
  <span><b id="s-streak">·</b> repo más caliente 🔥</span>
</div>

<div class="grid" id="grid"></div>

<div class="fact" id="fact"><span class="lbl">DATO_DEL_DÍA //</span> <span id="fact-txt">cargando…</span></div>

<footer>
  Teclas <kbd>1</kbd>–<kbd>9</kbd> abren un proyecto · <kbd>r</kbd> refresca datos · stats vía GitHub API (público, ~60 req/h).
  <span id="rate"></span>
</footer>

<script>
const USER = "rafaelmaldonado";
// ponytail: repos hardcoded — es tu lista fija, no hay descubrimiento dinámico que valga la pena
const PROJECTS = [
  {repo:"react-training",       name:"React",          desc:"Hooks, patrones, estado y lo que duela del ecosistema.", tags:["react","js","vite"]},
  {repo:"aem-eds-training",     name:"AEM Edge Delivery", desc:"Edge Delivery Services: bloques, docs-as-content, perf.", tags:["aem","eds","perf"]},
  {repo:"aem-cloud-migration",  name:"AEM Migration",  desc:"Migración a AEM as a Cloud Service. Lo pesado.", tags:["aem","cloud","java"]},
  {repo:"japones",              name:"日本語",          desc:"Kana, kanji, gramática. Compilar el idioma en el cerebro.", tags:["日本語","srs"]},
  {repo:"claude-certified-architect", name:"Claude Certified", desc:"Camino a la certificación de arquitecto Anthropic.", tags:["ai","claude","arch"]},
  {repo:"learn-java-21-aem",    name:"Java 21 · AEM",   desc:"Java moderno (8→21) para código AEM: Optional, streams, records.", tags:["java","aem","jvm"]},
];
const START = new Date("2026-07-16"); // ponytail: ajusta si empezaste antes/después
const pagesUrl = r => `https://${USER}.github.io/${r}/`;
const repoUrl  = r => `https://github.com/${USER}/${r}`;

const facts = [
  "El bug del Mars Climate Orbiter (1999): perdieron una sonda de $327M por mezclar unidades métricas e imperiales.",
  "La primera 'bug' real fue una polilla pegada a un relé del Harvard Mark II en 1947. Grace Hopper la pegó al log.",
  "Un año-luz de código a 80 col: ~370 mil millones de líneas. Tu repo probablemente no llega.",
  "El 'null' costó ~mil millones en fallos según Tony Hoare, que lo llamó su 'error de mil millones de dólares'.",
  "git guarda todo por hash SHA-1: dos commits idénticos son literalmente el mismo objeto.",
  "日本語 tiene 3 sistemas de escritura mezclados. Es como leer código en 3 lenguajes a la vez.",
  "El primer programa 'Hello World' apareció en un tutorial de B en 1972, antes que C.",
  "La complejidad ciclomática > 10 en una función = hora de refactorizar. O de rezar.",
  "AEM EDS sirve HTML desde un Google Doc. La arquitectura más rara que amarás.",
  "Un LLM no 'sabe' nada: predice el siguiente token. Como tú en un examen sin estudiar.",
  "El caché tiene dos problemas difíciles: invalidación de caché, nombrar cosas, y errores off-by-one.",
  "Regla de Kernighan: depurar es 2x más difícil que escribir el código. No escribas tu código al máximo de tu ingenio.",
];

function dayIndex(){ // determinístico por día → mismo dato todo el día, cambia mañana
  return Math.floor((Date.now() - +START) / 864e5);
}

const grid = document.getElementById("grid");
PROJECTS.forEach((p,i)=>{
  const a=document.createElement("a");
  a.href=pagesUrl(p.repo); a.className="card"; a.dataset.i=i+1;
  a.innerHTML=`
    <span class="k">${i+1}</span>
    <h2>${p.name}</h2>
    <p>${p.desc}</p>
    <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    <div class="stats" id="st-${p.repo}">
      <span class="spin"><span class="dot"></span>consultando GitHub…</span>
    </div>`;
  grid.appendChild(a);
});

function ago(d){
  const days=Math.floor((Date.now()-+new Date(d))/864e5);
  if(days<=0) return {t:"hoy", fresh:true};
  if(days===1) return {t:"ayer", fresh:true};
  if(days<7)  return {t:`${days}d`, fresh:true};
  if(days<30) return {t:`${days}d`, fresh:false};
  return {t:`${Math.floor(days/30)}mes`, fresh:false};
}

async function loadStats(){
  let totalCommits=0, hottest={repo:"—",n:-1}, active=0;
  const since=new Date(Date.now()-30*864e5).toISOString();
  await Promise.all(PROJECTS.map(async p=>{
    const el=document.getElementById("st-"+p.repo);
    try{
      const [repoR, commitsR] = await Promise.all([
        fetch(`https://api.github.com/repos/${USER}/${p.repo}`),
        fetch(`https://api.github.com/repos/${USER}/${p.repo}/commits?since=${since}&per_page=100`)
      ]);
      if(!repoR.ok) throw new Error(repoR.status);
      const repo=await repoR.json();
      const commits = commitsR.ok ? await commitsR.json() : [];
      const n = Array.isArray(commits)?commits.length:0;
      totalCommits+=n; active++;
      if(n>hottest.n) hottest={repo:p.name,n};
      const a=ago(repo.pushed_at);
      el.innerHTML=`
        <span class="${a.fresh?'fresh':'stale'}"><span class="dot" style="background:${a.fresh?'var(--acc)':'var(--warn)'}"></span>push ${a.t}</span>
        <span><b>${n}</b> commits/30d</span>
        <span><b>${repo.language||'—'}</b></span>
        <span>★<b>${repo.stargazers_count}</b></span>`;
    }catch(e){
      el.innerHTML=`<span class="stale"><span class="dot" style="background:var(--red)"></span>sin datos (${e.message})</span>`;
    }
  }));
  document.getElementById("s-total").textContent=active||PROJECTS.length;
  document.getElementById("s-commits").textContent=totalCommits;
  document.getElementById("s-streak").textContent=hottest.repo;
}

function tick(){
  const d=new Date();
  const up=Math.floor((Date.now()-+START)/864e5);
  document.getElementById("s-days").textContent=up;
  document.getElementById("clock").innerHTML=
    `uptime <b>${up}d</b> · ${d.toLocaleTimeString('es',{hour12:false})} · ${d.toLocaleDateString('es')}`;
}

document.getElementById("fact-txt").textContent = facts[dayIndex()%facts.length];
setInterval(tick,1000); tick();
loadStats();

addEventListener("keydown",e=>{
  if(e.key>="1"&&e.key<="9"){const c=document.querySelector(`.card[data-i="${e.key}"]`); if(c) location.href=c.href;}
  if(e.key==="r"){document.querySelectorAll(".stats").forEach(s=>s.innerHTML='<span class="spin"><span class="dot"></span>refrescando…</span>');loadStats();}
});
</script>
</body>
</html>
