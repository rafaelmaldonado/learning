<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~/learning</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#11151f; --line:#1c2230; --fg:#c9d1d9;
    --dim:#5c6b82; --acc:#39d353; --acc2:#58a6ff; --warn:#e3b341; --red:#f85149;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--fg);
    font:14px/1.5 "SFMono-Regular",ui-monospace,"JetBrains Mono",Consolas,monospace;
    padding:24px; max-width:1100px; margin:0 auto;
  }
  a{color:var(--acc2);text-decoration:none}
  header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--line);padding-bottom:12px}
  h1{font-size:18px;margin:0;color:var(--fg)}
  h1 .c{color:var(--acc)}
  .cursor{display:inline-block;width:9px;height:1.05em;background:var(--acc);margin-left:4px;vertical-align:text-bottom;animation:blink 1s step-end infinite}
  @keyframes blink{50%{opacity:0}}
  .clock{color:var(--dim);font-size:12px}
  .clock b{color:var(--warn)}
  .bar{display:flex;gap:24px;flex-wrap:wrap;margin:16px 0;color:var(--dim);font-size:12px}
  .bar b{color:var(--acc);font-size:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-top:8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;position:relative;transition:.15s;cursor:pointer}
  .card:hover{border-color:var(--acc2);transform:translateY(-2px)}
  .card .k{position:absolute;top:12px;right:14px;color:var(--dim);border:1px solid var(--line);border-radius:4px;padding:1px 7px;font-size:11px}
  .card h2{font-size:15px;margin:0 0 4px;color:var(--fg)}
  .card p{margin:0 0 12px;color:var(--dim);font-size:12.5px;min-height:34px}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;color:var(--acc);background:#0d1f14;border:1px solid #1c3a26;padding:1px 8px;border-radius:20px}
  .prog{display:inline-flex;align-items:center;gap:7px;margin-left:auto}
  .prog .track{width:70px;height:6px;border-radius:3px;background:#0d1f14;border:1px solid #1c3a26;overflow:hidden}
  .prog .fill{height:100%;background:var(--acc);border-radius:3px 0 0 3px; display:block}
  .prog .pct{color:var(--dim);font-variant-numeric:tabular-nums}
  .stats{display:flex;gap:16px;font-size:11.5px;color:var(--dim);border-top:1px solid var(--line);padding-top:10px}
  .stats span b{color:var(--fg);font-weight:600}
  .stats .fresh{color:var(--acc)} .stats .stale{color:var(--warn)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--dim);margin-right:5px}
  .fact{margin:22px 0 4px;padding:14px 16px;background:var(--panel);border-left:3px solid var(--warn);border-radius:0 6px 6px 0;color:var(--fg);font-size:13px}
  .fact .lbl{color:var(--warn);font-size:11px;letter-spacing:1px}
  #feed{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
  #feed li{display:flex;gap:10px;align-items:baseline}
  #feed .src{color:var(--acc);font-size:10.5px;min-width:82px;text-transform:uppercase;letter-spacing:.5px}
  #feed a{color:var(--fg)} #feed a:hover{color:var(--acc2)}
  #feed .meta{color:var(--dim);font-size:11px;white-space:nowrap}
  footer{margin-top:28px;color:var(--dim);font-size:11px;border-top:1px solid var(--line);padding-top:12px}
  footer kbd{background:var(--line);border-radius:3px;padding:1px 6px;color:var(--fg)}
  .spin{color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1><span class="c">rafael</span>@learning:<span class="c">~</span>$ ./study.sh<span class="cursor"></span></h1>
  <div class="clock" id="clock">booting…</div>
</header>

<div class="bar" id="bar">
  <span><b id="s-total">·</b> repos activos</span>
  <span><b id="s-commits">·</b> commits (30d)</span>
  <span><b id="s-days">·</b> días aprendiendo</span>
  <span><b id="s-streak">·</b> repo más caliente 🔥</span>
</div>

<div class="grid" id="grid"></div>

<div class="fact" id="fact">
  <span class="lbl">FEED_DEV // lo que se cuece hoy</span>
  <ul id="feed"><li class="spin">cargando feeds…</li></ul>
</div>

<footer>
  Teclas <kbd>1</kbd>–<kbd>9</kbd> abren un proyecto · <kbd>r</kbd> fuerza refresco · stats vía GitHub API (cacheadas 3h; anónimo = 60 req/h).
  <span id="rate"></span>
</footer>

<script>
const USER = "rafaelmaldonado";
// ponytail: repos hardcoded — es tu lista fija, no hay descubrimiento dinámico que valga la pena
// progress = lecciones en lessons/ (contadas vía GitHub API) / total planeado.
// Crear una lección sube la barra sola. `total` es el estimado de lecciones del curso;
// vive también en MISSION.md de cada repo (ajústalo ahí y aquí si cambia el plan).
const PROJECTS = [
  {repo:"react-training",       name:"React",          desc:"Hooks, patrones, estado y lo que duela del ecosistema.", tags:["react","js","vite"], total:30},
  {repo:"aem-eds-training",     name:"AEM Edge Delivery", desc:"Edge Delivery Services: bloques, docs-as-content, perf.", tags:["aem","eds","perf"], total:25},
  {repo:"aem-cloud-migration",  name:"AEM Migration",  desc:"Migración a AEM as a Cloud Service. Lo pesado.", tags:["aem","cloud","java"], total:30},
  {repo:"japones",              name:"日本語",          desc:"Kana, kanji, gramática. Compilar el idioma en el cerebro.", tags:["日本語","srs"], total:60},
  {repo:"claude-certified-architect", name:"Claude Certified", desc:"Camino a la certificación de arquitecto Anthropic.", tags:["ai","claude","arch"], total:20},
  {repo:"learn-java-21-aem",    name:"Java 21 · AEM",   desc:"Java moderno (8→21) para código AEM: Optional, streams, records.", tags:["java","aem","jvm"], total:22},
  {repo:"learn-aem-forms-backend", name:"AEM Forms Backend", desc:"AEM Forms del lado servidor: submit handlers, workflows, integraciones.", tags:["aem","forms","java"], total:25},
  {repo:"learn-amazon-fba",     name:"Amazon FBA",      desc:"Fulfillment by Amazon: sourcing, listings, logística y márgenes.", tags:["fba","ecommerce","ops"], total:20},
  {repo:"learn-aem-assets-professional",     name:"AEM Assets Developer",      desc:"AEM Assets Developer Professional Certification", tags:["aem","assets","metadata"], total:18},
];
const START = new Date("2026-07-16"); // ponytail: ajusta si empezaste antes/después
const pagesUrl = r => `https://${USER}.github.io/${r}/`;
const repoUrl  = r => `https://github.com/${USER}/${r}`;

const facts = [
  "El bug del Mars Climate Orbiter (1999): perdieron una sonda de $327M por mezclar unidades métricas e imperiales.",
  "La primera 'bug' real fue una polilla pegada a un relé del Harvard Mark II en 1947. Grace Hopper la pegó al log.",
  "Un año-luz de código a 80 col: ~370 mil millones de líneas. Tu repo probablemente no llega.",
  "El 'null' costó ~mil millones en fallos según Tony Hoare, que lo llamó su 'error de mil millones de dólares'.",
  "git guarda todo por hash SHA-1: dos commits idénticos son literalmente el mismo objeto.",
  "日本語 tiene 3 sistemas de escritura mezclados. Es como leer código en 3 lenguajes a la vez.",
  "El primer programa 'Hello World' apareció en un tutorial de B en 1972, antes que C.",
  "La complejidad ciclomática > 10 en una función = hora de refactorizar. O de rezar.",
  "AEM EDS sirve HTML desde un Google Doc. La arquitectura más rara que amarás.",
  "Un LLM no 'sabe' nada: predice el siguiente token. Como tú en un examen sin estudiar.",
  "El caché tiene dos problemas difíciles: invalidación de caché, nombrar cosas, y errores off-by-one.",
  "Regla de Kernighan: depurar es 2x más difícil que escribir el código. No escribas tu código al máximo de tu ingenio.",
];

function dayIndex(){ // determinístico por día → mismo dato todo el día, cambia mañana
  return Math.floor((Date.now() - +START) / 864e5);
}

const grid = document.getElementById("grid");
PROJECTS.forEach((p,i)=>{
  const a=document.createElement("a");
  a.href=pagesUrl(p.repo); a.className="card"; a.dataset.i=i+1;
  a.innerHTML=`
    <span class="k">${i+1}</span>
    <h2>${p.name}</h2>
    <p>${p.desc}</p>
    <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    <div class="stats" id="st-${p.repo}">
      <span class="spin"><span class="dot"></span>consultando GitHub…</span>
    </div>`;
  grid.appendChild(a);
});

function ago(d){
  const days=Math.floor((Date.now()-+new Date(d))/864e5);
  if(days<=0) return {t:"hoy", fresh:true};
  if(days===1) return {t:"ayer", fresh:true};
  if(days<7)  return {t:`${days}d`, fresh:true};
  if(days<30) return {t:`${days}d`, fresh:false};
  return {t:`${Math.floor(days/30)}mes`, fresh:false};
}

// GitHub anónimo = 60 req/h; 6 repos × 3 llamadas gasta el cupo en 3 recargas.
// Cacheamos por repo 3h; si la API falla (403), reusamos la caché aunque esté vencida.
const TTL = 3*3600*1e3;
function cacheGet(repo){ try{ return JSON.parse(localStorage.getItem("gh:"+repo)); }catch{ return null; } }
function cacheSet(repo,data){ try{ localStorage.setItem("gh:"+repo, JSON.stringify({t:Date.now(),data})); }catch{} }

async function fetchRepo(p, since){
  const [repoR, commitsR, lessonsR] = await Promise.all([
    fetch(`https://api.github.com/repos/${USER}/${p.repo}`),
    fetch(`https://api.github.com/repos/${USER}/${p.repo}/commits?since=${since}&per_page=100`),
    fetch(`https://api.github.com/repos/${USER}/${p.repo}/contents/lessons`)
  ]);
  if(!repoR.ok) throw new Error(repoR.status);
  const repo=await repoR.json();
  const commits = commitsR.ok ? await commitsR.json() : [];
  const lessons = lessonsR.ok ? await lessonsR.json() : [];
  return {
    pushed_at: repo.pushed_at,
    commits: Array.isArray(commits)?commits.length:0,
    done: Array.isArray(lessons) ? lessons.filter(f=>/^\d+.*\.html$/.test(f.name)).length : 0,
  };
}

// stats.json lo genera una GitHub Action cada 6h (API autenticada, sin límite práctico).
// Si existe lo usamos → 0 llamadas a la API en runtime. Si no, caemos a fetch en vivo + caché.
async function loadStats(force){
  let totalCommits=0, hottest={repo:"—",n:-1}, active=0;
  const since=new Date(Date.now()-30*864e5).toISOString();
  let precomputed=null;
  if(!force){
    try{ const r=await fetch("stats.json",{cache:"no-cache"}); if(r.ok) precomputed=(await r.json()).repos; }catch{}
  }
  await Promise.all(PROJECTS.map(async p=>{
    const el=document.getElementById("st-"+p.repo);
    const cached=cacheGet(p.repo);
    let d, stale=false;
    if(precomputed && precomputed[p.repo]){
      d=precomputed[p.repo]; cacheSet(p.repo,d); // fuente de verdad: la Action
    } else if(!force && cached && Date.now()-cached.t < TTL){
      d=cached.data; // caché fresca: no gastamos cuota
    } else {
      try{ d=await fetchRepo(p,since); cacheSet(p.repo,d); }
      catch(e){
        if(cached){ d=cached.data; stale=true; }        // API falló → caché vieja
        else{ el.innerHTML=`<span class="stale"><span class="dot" style="background:var(--red)"></span>sin datos (${e.message})</span>`; return; }
      }
    }
    totalCommits+=d.commits; active++;
    if(d.commits>hottest.n) hottest={repo:p.name,n:d.commits};
    const pct=Math.min(100, Math.round(d.done / p.total * 100));
    const a=ago(d.pushed_at);
    el.innerHTML=`
      <span class="${a.fresh?'fresh':'stale'}"><span class="dot" style="background:${a.fresh?'var(--acc)':'var(--warn)'}"></span>push ${a.t}</span>
      <span><b>${d.commits}</b> commits/30d</span>
      <span class="prog" title="${d.done}/${p.total} lecciones (${pct}%)${stale?' · caché':''}"><span class="track"><span class="fill" style="width:${pct}%"></span></span><span class="pct">${d.done}/${p.total}</span></span>`;
  }));
  document.getElementById("s-total").textContent=active||PROJECTS.length;
  document.getElementById("s-commits").textContent=totalCommits;
  document.getElementById("s-streak").textContent=hottest.repo;
}

function tick(){
  const d=new Date();
  const up=Math.floor((Date.now()-+START)/864e5);
  document.getElementById("s-days").textContent=up;
  document.getElementById("clock").innerHTML=
    `uptime <b>${up}d</b> · ${d.toLocaleTimeString('es',{hour12:false})} · ${d.toLocaleDateString('es')}`;
}

// 3 fuentes con CORS abierto. Cada una devuelve una lista; tomamos 1 item rotado por día.
const FEEDS = [
  {src:"Hacker News", url:"https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=30",
   pick:d=>d.hits.filter(h=>h.title&&h.url).map(h=>({title:h.title,url:h.url,meta:`▲${h.points} · ${h.num_comments||0}💬`}))},
  {src:"Dev.to", url:"https://dev.to/api/articles?top=1&per_page=30",
   pick:d=>d.map(a=>({title:a.title,url:a.url,meta:`♥${a.positive_reactions_count} · ${a.reading_time_minutes}min`}))},
  {src:"r/programming", url:"https://www.reddit.com/r/programming/top.json?t=day&limit=30",
   pick:d=>d.data.children.map(c=>c.data).filter(p=>!p.stickied).map(p=>({title:p.title,url:"https://reddit.com"+p.permalink,meta:`▲${p.ups} · ${p.num_comments}💬`}))},
];

async function loadFeed(){
  const ul=document.getElementById("feed");
  const items=await Promise.all(FEEDS.map(async f=>{
    try{
      const r=await fetch(f.url); if(!r.ok) throw 0;
      const list=f.pick(await r.json());
      if(!list.length) throw 0;
      const it=list[dayIndex()%list.length]; // rota por día, distinto item cada fuente
      return `<li><span class="src">${f.src}</span>`+
        `<a href="${it.url}" target="_blank" rel="noopener">${it.title}</a>`+
        `<span class="meta">${it.meta}</span></li>`;
    }catch{ return null; }
  }));
  const ok=items.filter(Boolean);
  ul.innerHTML = ok.length
    ? ok.join("")
    : `<li><span class="src">offline</span>${facts[dayIndex()%facts.length]}</li>`; // fallback: dato geek local
}
loadFeed();
setInterval(tick,1000); tick();
loadStats();

addEventListener("keydown",e=>{
  if(e.key>="1"&&e.key<="9"){const c=document.querySelector(`.card[data-i="${e.key}"]`); if(c) location.href=c.href;}
  if(e.key==="r"){document.querySelectorAll(".stats").forEach(s=>s.innerHTML='<span class="spin"><span class="dot"></span>refrescando…</span>');loadStats(true);}
});
</script>
</body>
</html>
